name: Update task data (cache-first scrape for active league)

on:
  schedule:
    # Hourly during active leagues (on the hour)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if a league is marked active
        id: check-active
        run: |
          read ACTIVE SOURCE_TYPE < <(python3 -c "
          import json
          leagues = json.load(open('leagues/index.json'))
          for l in leagues:
            if l.get('active') and l.get('taskTypeName'):
              print(l['taskTypeName'], l.get('sourceType', 'STRUCT'))
              break
          ")
          if [ -z "$ACTIVE" ]; then
            echo "No active league, skipping"
            echo "active=false" >> "$GITHUB_OUTPUT"
          else
            echo "Active league: $ACTIVE (source: $SOURCE_TYPE)"
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "task_type=$ACTIVE" >> "$GITHUB_OUTPUT"
            echo "source_type=$SOURCE_TYPE" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check-active.outputs.active == 'true'
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.check-active.outputs.active == 'true'
        run: npm ci

      - name: Download game cache
        # Both STRUCT (struct lookups) and DBROW (col 34 active set + enum reads)
        # require fresh cache.
        if: steps.check-active.outputs.active == 'true'
        run: npm run cli -- cache update

      - name: Refresh task data (DBROW - cache-first, no classifier)
        # dbrow:scrape determines membership from cache (col 34 = 1) and merges
        # wiki for supplementary fields. --no-classify preserves prior coords
        # without running Python; manual workflow trigger or local run handles
        # classifier refresh after membership changes.
        if: steps.check-active.outputs.active == 'true' && steps.check-active.outputs.source_type == 'DBROW'
        run: npm run cli -- tasks dbrow:scrape ${{ steps.check-active.outputs.task_type }} --no-classify

      - name: Refresh wiki data (STRUCT)
        # STRUCT leagues use the lighter wiki-merge path against existing full.json.
        if: steps.check-active.outputs.active == 'true' && steps.check-active.outputs.source_type == 'STRUCT'
        run: npm run cli -- tasks update-wiki ${{ steps.check-active.outputs.task_type }}

      - name: Commit and push if changed
        if: steps.check-active.outputs.active == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leagues/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Refresh task data for ${{ steps.check-active.outputs.task_type }}"
            git push
          fi
