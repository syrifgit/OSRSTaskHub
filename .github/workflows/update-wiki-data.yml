name: Update wiki data (completion %, skills, notes)

on:
  schedule:
    # Hourly during active leagues (on the hour)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if a league is marked active
        id: check-active
        run: |
          read ACTIVE SOURCE_TYPE < <(python3 -c "
          import json
          leagues = json.load(open('leagues/index.json'))
          for l in leagues:
            if l.get('active') and l.get('taskTypeName'):
              print(l['taskTypeName'], l.get('sourceType', 'STRUCT'))
              break
          ")
          if [ -z "$ACTIVE" ]; then
            echo "No active league, skipping"
            echo "active=false" >> "$GITHUB_OUTPUT"
          else
            echo "Active league: $ACTIVE (source: $SOURCE_TYPE)"
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "task_type=$ACTIVE" >> "$GITHUB_OUTPUT"
            echo "source_type=$SOURCE_TYPE" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check-active.outputs.active == 'true'
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.check-active.outputs.active == 'true'
        run: npm ci

      - name: Download game cache
        # STRUCT path needs cache to load structs for varbit-index params.
        # DBROW path merges by sortId (= wikiTaskIndex) and skips cache entirely.
        if: steps.check-active.outputs.active == 'true' && steps.check-active.outputs.source_type == 'STRUCT'
        run: npm run cli -- cache update

      - name: Re-scrape wiki data
        if: steps.check-active.outputs.active == 'true'
        run: npm run cli -- tasks update-wiki ${{ steps.check-active.outputs.task_type }}

      - name: Commit and push if changed
        if: steps.check-active.outputs.active == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leagues/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update wiki data for ${{ steps.check-active.outputs.task_type }}"
            git push
          fi
