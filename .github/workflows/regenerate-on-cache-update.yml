name: Regenerate task data on cache update

on:
  schedule:
    # Check every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache freshness check runs unconditionally - we always want the local
      # cache to track upstream, even between leagues (for discovery, manual runs, etc).
      - name: Check if cache has updated
        id: check-cache
        run: |
          LATEST=$(git ls-remote https://github.com/abextm/osrs-cache.git HEAD | cut -f1)
          echo "latest_cache=$LATEST" >> "$GITHUB_OUTPUT"

          if [ -f osrs-cache/cache-version.txt ]; then
            CURRENT=$(cat osrs-cache/cache-version.txt)
          else
            CURRENT="none"
          fi
          echo "current_cache=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Cache unchanged"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Cache updated: $CURRENT -> $LATEST"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check-cache.outputs.changed == 'true'
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.check-cache.outputs.changed == 'true'
        run: npm ci

      - name: Download updated game cache
        if: steps.check-cache.outputs.changed == 'true'
        run: npm run cli -- cache update

      # Check for active league AFTER cache update - regeneration only runs
      # if there's an active league, but the cache itself stays fresh either way.
      - name: Check if a league is marked active
        if: steps.check-cache.outputs.changed == 'true'
        id: check-active
        run: |
          read ACTIVE SOURCE_TYPE < <(python3 -c "
          import json
          leagues = json.load(open('leagues/index.json'))
          for l in leagues:
            if l.get('active') and l.get('taskTypeName'):
              print(l['taskTypeName'], l.get('sourceType', 'STRUCT'))
              break
          ")
          if [ -z "$ACTIVE" ]; then
            echo "No active league, skipping regeneration"
            echo "active=false" >> "$GITHUB_OUTPUT"
          else
            echo "Active league: $ACTIVE (source: $SOURCE_TYPE)"
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "task_type=$ACTIVE" >> "$GITHUB_OUTPUT"
            echo "source_type=$SOURCE_TYPE" >> "$GITHUB_OUTPUT"
          fi

      # DBROW path: single command handles cache enrichment + wiki + classifier
      - name: Regenerate (DBROW - full pipeline with classifier)
        if: steps.check-active.outputs.active == 'true' && steps.check-active.outputs.source_type == 'DBROW'
        run: npm run cli -- tasks dbrow:scrape ${{ steps.check-active.outputs.task_type }}

      # STRUCT path: extract -> wiki scrape -> classify -> merge are separate steps
      - name: Generate full task JSON (STRUCT)
        if: steps.check-active.outputs.active == 'true' && steps.check-active.outputs.source_type == 'STRUCT'
        run: npm run cli -- tasks generate-full ${{ steps.check-active.outputs.task_type }}

      - name: Classify task locations (STRUCT)
        if: steps.check-active.outputs.active == 'true' && steps.check-active.outputs.source_type == 'STRUCT'
        run: |
          LEAGUE_DIR=$(python3 -c "
          import json
          leagues = json.load(open('leagues/index.json'))
          for l in leagues:
            if l.get('taskTypeName','').upper() == '${{ steps.check-active.outputs.task_type }}'.upper():
              print('leagues/' + l['dir'])
              break
          ")
          TASK_TYPE=${{ steps.check-active.outputs.task_type }}
          python3 classify/classify.py \
            --input="${LEAGUE_DIR}/${TASK_TYPE}.full.json" \
            --coords \
            --output="${LEAGUE_DIR}/locations.json" \
            --data-dir=classify/data/
          npm run cli -- tasks merge-locations ${TASK_TYPE} \
            --locations="${LEAGUE_DIR}/locations.json"

      - name: Commit and push if changed
        if: steps.check-cache.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f osrs-cache/cache-version.txt
          if [ "${{ steps.check-active.outputs.active }}" = "true" ]; then
            git add leagues/
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            if [ "${{ steps.check-active.outputs.active }}" = "true" ]; then
              git commit -m "Auto-regenerate ${{ steps.check-active.outputs.task_type }} (cache update)"
            else
              git commit -m "Update cache version pointer (no active league)"
            fi
            git push
          fi
