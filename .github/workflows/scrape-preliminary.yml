name: Scrape preliminary wiki data

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Task type to scrape (e.g., LEAGUE_6). Must exist in leagues/index.json with a wikiUrl.'
        required: true
        default: 'LEAGUE_6'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Scrape wiki
        run: npm run cli -- tasks scrape-preliminary ${{ inputs.task_type }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leagues/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Preliminary wiki scrape for ${{ inputs.task_type }}"
            git push
          fi
